<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QIM Logo - Algorithmic Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --qim-deep-blue: #1a237e;
            --qim-cyan: #00bcd4;
            --qim-white: #ffffff;
            --qim-light-bg: #f5f7fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--qim-light-bg) 0%, #e8eef5 100%);
            min-height: 100vh;
            color: var(--qim-deep-blue);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(26, 35, 126, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--qim-deep-blue);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: #5c6bc0;
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .control-section {
            margin-bottom: 32px;
        }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--qim-deep-blue);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--qim-cyan);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--qim-light-bg);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid #c5cae9;
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--qim-cyan);
            box-shadow: 0 0 0 2px rgba(0, 188, 212, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button {
            margin-bottom: 0;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--qim-deep-blue);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: #c5cae9;
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--qim-cyan);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #00acc1;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--qim-cyan);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #5c6bc0;
            min-width: 60px;
            text-align: right;
        }

        .color-group {
            margin-bottom: 16px;
        }

        .color-group label {
            display: block;
            font-size: 12px;
            color: #5c6bc0;
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #5c6bc0;
        }

        .button {
            background: var(--qim-cyan);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #00acc1;
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: var(--qim-deep-blue);
        }

        .button.secondary:hover {
            background: #283593;
        }

        .button.tertiary {
            background: #5c6bc0;
        }

        .button.tertiary:hover {
            background: #3f51b5;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button {
            flex: 1;
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 600px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(26, 35, 126, 0.15);
            background: white;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #5c6bc0;
        }

        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .canvas-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>QIM Logo</h1>
            <div class="subtitle">即时通讯应用的算法艺术Logo设计</div>

            <div class="control-section">
                <h3>种子</h3>
                <input type="number" id="seed-input" class="seed-input" value="42069" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← 上一</button>
                    <button class="button secondary" onclick="nextSeed()">下一 →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ 随机</button>
            </div>

            <div class="control-section">
                <h3>参数</h3>

                <div class="control-group">
                    <label>背景网格密度</label>
                    <div class="slider-container">
                        <input type="range" id="gridDensity" min="10" max="40" step="2" value="24" oninput="updateParam('gridDensity', this.value)">
                        <span class="value-display" id="gridDensity-value">24</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>曲线强度</label>
                    <div class="slider-container">
                        <input type="range" id="curveIntensity" min="0.5" max="3" step="0.1" value="1.5" oninput="updateParam('curveIntensity', this.value)">
                        <span class="value-display" id="curveIntensity-value">1.5</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>粒子数量</label>
                    <div class="slider-container">
                        <input type="range" id="particleCount" min="50" max="300" step="10" value="150" oninput="updateParam('particleCount', this.value)">
                        <span class="value-display" id="particleCount-value">150</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Q形状偏移</label>
                    <div class="slider-container">
                        <input type="range" id="shapeOffset" min="0" max="0.3" step="0.02" value="0.1" oninput="updateParam('shapeOffset', this.value)">
                        <span class="value-display" id="shapeOffset-value">0.1</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>光晕强度</label>
                    <div class="slider-container">
                        <input type="range" id="glowIntensity" min="0" max="1" step="0.05" value="0.6" oninput="updateParam('glowIntensity', this.value)">
                        <span class="value-display" id="glowIntensity-value">0.6</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>颜色</h3>

                <div class="color-group">
                    <label>主色 (深蓝)</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorDeepBlue" value="#1a237e" onchange="updateColor('colorDeepBlue', this.value)">
                        <span class="color-value" id="colorDeepBlue-value">#1a237e</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>强调色 (青色)</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorCyan" value="#00bcd4" onchange="updateColor('colorCyan', this.value)">
                        <span class="color-value" id="colorCyan-value">#00bcd4</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>高光色 (白色)</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorWhite" value="#ffffff" onchange="updateColor('colorWhite', this.value)">
                        <span class="color-value" id="colorWhite-value">#ffffff</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>操作</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">重置</button>
                    <button class="button secondary" onclick="downloadPNG()">下载PNG</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">正在初始化算法艺术...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 42069,
            gridDensity: 24,
            curveIntensity: 1.5,
            particleCount: 150,
            shapeOffset: 0.1,
            glowIntensity: 0.6,
            colorDeepBlue: '#1a237e',
            colorCyan: '#00bcd4',
            colorWhite: '#ffffff'
        };

        let defaultParams = {...params};
        let particles = [];
        let canvas;

        function setup() {
            canvas = createCanvas(512, 512);
            canvas.parent('canvas-container');
            noSmooth();
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);

            particles = [];
            for (let i = 0; i < params.particleCount; i++) {
                particles.push(new FlowParticle());
            }

            drawLogo();
        }

        function drawLogo() {
            let deepBlue = parseColor(params.colorDeepBlue);
            let cyan = parseColor(params.colorCyan);
            let white = parseColor(params.colorWhite);

            // Background gradient mesh
            drawBackgroundMesh(deepBlue, cyan, white);

            // Draw subtle flow field background
            drawFlowField();

            // Draw connection network
            drawNetwork();

            // Draw the main Q letterform
            drawQLetterform(deepBlue, cyan, white);

            // Draw orbital rings
            drawOrbitalRings(deepBlue, cyan);

            // Draw particles
            drawParticles(white, cyan);

            // Apply glow effect
            if (params.glowIntensity > 0) {
                applyGlowEffect(deepBlue, cyan);
            }
        }

        function drawBackgroundMesh(deepBlue, cyan, white) {
            // Base gradient from deep blue to slightly lighter
            background(deepBlue);

            // Create mesh gradient effect
            let cx = width / 2;
            let cy = height / 2;
            let maxDist = dist(0, 0, cx, cy);

            noStroke();
            for (let r = maxDist; r > 0; r -= 20) {
                let inter = map(r, 0, maxDist, 0, 1);
                let c = lerpColor(cyan, deepBlue, inter * 0.7);
                c.setAlpha(15);
                fill(c);
                ellipse(cx, cy, r * 2, r * 2);
            }

            // Radial highlight
            let highlightGrad = drawingContext.createRadialGradient(cx - 80, cy - 80, 0, cx, cy, 300);
            highlightGrad.addColorStop(0, 'rgba(0, 188, 212, 0.15)');
            highlightGrad.addColorStop(0.5, 'rgba(26, 35, 126, 0.05)');
            highlightGrad.addColorStop(1, 'rgba(26, 35, 126, 0)');
            drawingContext.fillStyle = highlightGrad;
            drawingContext.fillRect(0, 0, width, height);
        }

        function drawFlowField() {
            let density = params.gridDensity;
            let intensity = params.curveIntensity;
            let cx = width / 2;
            let cy = height / 2;

            strokeWeight(0.5);

            for (let x = 20; x < width - 20; x += density) {
                for (let y = 20; y < height - 20; y += density) {
                    let angle = noise(x * 0.008 * intensity, y * 0.008 * intensity, params.seed * 0.01) * TWO_PI * 2;
                    let len = density * 0.8;

                    let x2 = x + cos(angle) * len;
                    let y2 = y + sin(angle) * len;

                    let distFromCenter = dist(x, y, cx, cy);
                    let alpha = map(distFromCenter, 0, 200, 30, 80);

                    stroke(0, 188, 212, alpha);
                    line(x, y, x2, y2);
                }
            }
        }

        function drawNetwork() {
            let cx = width / 2;
            let cy = height / 2;
            let nodes = [];
            let nodeCount = 8;

            // Create network nodes
            for (let i = 0; i < nodeCount; i++) {
                let angle = (TWO_PI / nodeCount) * i + params.shapeOffset;
                let r = 160 + noise(i * 10, params.seed) * 40;
                nodes.push({
                    x: cx + cos(angle) * r,
                    y: cy + sin(angle) * r,
                    size: 3 + noise(i * 20, params.seed + 100) * 2
                });
            }

            // Draw connections
            strokeWeight(0.5);
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    let d = dist(nodes[i].x, nodes[i].y, nodes[j].x, nodes[j].y);
                    if (d < 180) {
                        let alpha = map(d, 0, 180, 100, 20);
                        stroke(0, 188, 212, alpha);
                        line(nodes[i].x, nodes[i].y, nodes[j].x, nodes[j].y);
                    }
                }
            }

            // Draw nodes
            noStroke();
            for (let node of nodes) {
                fill(0, 188, 212, 150);
                ellipse(node.x, node.y, node.size * 2);
            }
        }

        function drawQLetterform(deepBlue, cyan, white) {
            let cx = width / 2;
            let cy = height / 2;
            let qSize = 200;

            push();
            translate(cx, cy);

            // Main Q ring - outer arc
            noFill();
            strokeWeight(28);
            stroke(deepBlue);
            arc(0, 0, qSize * 1.8, qSize * 1.8, PI * 0.15, TWO_PI * 0.85);

            // Inner ring highlight
            strokeWeight(20);
            stroke(lerpColor(deepBlue, cyan, 0.3));
            arc(0, 0, qSize * 1.8, qSize * 1.8, PI * 0.15, TWO_PI * 0.85);

            // Q tail - geometric curved form
            strokeWeight(24);
            stroke(cyan);
            let tailStart = PI * 0.65;
            let tailEnd = PI * 1.1;
            arc(0, 0, qSize * 1.2, qSize * 1.2, tailStart, tailEnd);

            // Q tail accent
            strokeWeight(12);
            stroke(white);
            arc(0, 0, qSize * 1.2, qSize * 1.2, tailStart + 0.1, tailEnd - 0.05);

            // Central dot - communication hub
            noStroke();

            // Dot shadow
            fill(0, 0, 0, 50);
            ellipse(8, 8, 55, 55);

            // Main dot with gradient
            let dotGrad = drawingContext.createRadialGradient(-10, -10, 0, 0, 0, 35);
            dotGrad.addColorStop(0, params.colorWhite);
            dotGrad.addColorStop(0.6, params.colorCyan);
            dotGrad.addColorStop(1, params.colorDeepBlue);
            drawingContext.fillStyle = dotGrad;
            drawingContext.beginPath();
            drawingContext.arc(0, 0, 32, 0, TWO_PI * 2);
            drawingContext.fill();

            // Dot highlight
            fill(255, 255, 255, 200);
            ellipse(-8, -8, 12, 12);

            // Connection points on the Q ring
            let connectionPoints = [
                { angle: PI * 0.3, label: 'msg' },
                { angle: PI * 0.5, label: 'sync' },
                { angle: PI * 0.7, label: 'net' }
            ];

            for (let pt of connectionPoints) {
                let px = cos(pt.angle) * qSize * 0.9;
                let py = sin(pt.angle) * qSize * 0.9;

                // Pulse effect
                let pulse = sin(frameCount * 0.05 + pt.angle * 2) * 0.3 + 0.7;

                // Outer glow
                noStroke();
                fill(0, 188, 212, 30 * pulse);
                ellipse(px, py, 20, 20);

                // Core
                fill(0, 188, 212, 200 * pulse);
                ellipse(px, py, 8, 8);

                fill(255, 255, 255, 255 * pulse);
                ellipse(px, py, 4, 4);
            }

            pop();
        }

        function drawOrbitalRings(deepBlue, cyan) {
            let cx = width / 2;
            let cy = height / 2;

            noFill();
            strokeWeight(1);

            // Multiple orbital paths
            for (let i = 0; i < 3; i++) {
                let orbitRadius = 240 + i * 25;
                let rotation = params.seed * 0.001 + i * 0.3;

                push();
                translate(cx, cy);
                rotate(rotation);

                stroke(0, 188, 212, 40 - i * 10);
                strokeWeight(1);

                // Dashed orbital line
                let segments = 60;
                let dashLength = TWO_PI / segments;

                for (let j = 0; j < segments; j += 2) {
                    let a1 = j * dashLength;
                    let a2 = a1 + dashLength * 0.7;

                    let x1 = cos(a1) * orbitRadius;
                    let y1 = sin(a1) * orbitRadius * 0.3; // Elliptical
                    let x2 = cos(a2) * orbitRadius;
                    let y2 = sin(a2) * orbitRadius * 0.3;

                    line(x1, y1, x2, y2);
                }

                pop();
            }
        }

        function drawParticles(white, cyan) {
            let cx = width / 2;
            let cy = height / 2;

            noStroke();

            for (let p of particles) {
                p.update();
                p.display(white, cyan);
            }
        }

        function applyGlowEffect(deepBlue, cyan) {
            let cx = width / 2;
            let cy = height / 2;

            // Subtle center glow
            noStroke();
            for (let r = 100; r > 0; r -= 10) {
                let alpha = params.glowIntensity * map(r, 0, 100, 30, 0);
                fill(0, 188, 212, alpha);
                ellipse(cx, cy, r * 2, r * 2);
            }
        }

        class FlowParticle {
            constructor() {
                this.reset();
            }

            reset() {
                let cx = width / 2;
                let cy = height / 2;
                let angle = random(TWO_PI);
                let r = random(180, 280);
                this.x = cx + cos(angle) * r;
                this.y = cy + sin(angle) * r;
                this.vx = 0;
                this.vy = 0;
                this.life = random(100, 200);
                this.maxLife = this.life;
                this.size = random(1, 3);
            }

            update() {
                let cx = width / 2;
                let cy = height / 2;
                let angle = noise(this.x * 0.005, this.y * 0.005, params.seed * 0.01) * TWO_PI * 2;

                this.vx = cos(angle) * 0.5;
                this.vy = sin(angle) * 0.5;

                this.x += this.vx;
                this.y += this.vy;

                this.life--;

                if (this.life <= 0 || dist(this.x, this.y, cx, cy) > 300) {
                    this.reset();
                }
            }

            display(white, cyan) {
                let lifeRatio = this.life / this.maxLife;
                let alpha = lifeRatio * 150;

                noStroke();

                if (random() > 0.7) {
                    fill(0, 188, 212, alpha);
                } else {
                    fill(255, 255, 255, alpha * 0.7);
                }

                ellipse(this.x, this.y, this.size * lifeRatio);
            }
        }

        function parseColor(hex) {
            return color(red(hex), green(hex), blue(hex));
        }

        function red(hex) {
            return parseInt(hex.slice(1, 3), 16);
        }

        function green(hex) {
            return parseInt(hex.slice(3, 5), 16);
        }

        function blue(hex) {
            return parseInt(hex.slice(5, 7), 16);
        }

        function updateParam(paramName, value) {
            if (paramName === 'gridDensity' || paramName === 'particleCount') {
                params[paramName] = parseInt(value);
            } else {
                params[paramName] = parseFloat(value);
            }
            document.getElementById(paramName + '-value').textContent = params[paramName];
            drawLogo();
        }

        function updateColor(colorId, value) {
            params[colorId] = value;
            document.getElementById(colorId + '-value').textContent = value;
            drawLogo();
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = {...defaultParams};

            document.getElementById('gridDensity').value = params.gridDensity;
            document.getElementById('gridDensity-value').textContent = params.gridDensity;
            document.getElementById('curveIntensity').value = params.curveIntensity;
            document.getElementById('curveIntensity-value').textContent = params.curveIntensity;
            document.getElementById('particleCount').value = params.particleCount;
            document.getElementById('particleCount-value').textContent = params.particleCount;
            document.getElementById('shapeOffset').value = params.shapeOffset;
            document.getElementById('shapeOffset-value').textContent = params.shapeOffset;
            document.getElementById('glowIntensity').value = params.glowIntensity;
            document.getElementById('glowIntensity-value').textContent = params.glowIntensity;

            document.getElementById('colorDeepBlue').value = params.colorDeepBlue;
            document.getElementById('colorDeepBlue-value').textContent = params.colorDeepBlue;
            document.getElementById('colorCyan').value = params.colorCyan;
            document.getElementById('colorCyan-value').textContent = params.colorCyan;
            document.getElementById('colorWhite').value = params.colorWhite;
            document.getElementById('colorWhite-value').textContent = params.colorWhite;

            updateSeedDisplay();
            initializeSystem();
        }

        function downloadPNG() {
            saveCanvas(canvas, 'QIM-Logo-' + params.seed, 'png');
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
