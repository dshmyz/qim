appId: com.qim.app
productName: 青雀 QIM
electronVersion: "22.3.27"
files:
  - dist/**/*
  - electron/**/*
directories:
  output: electron-dist
  buildResources: electron/icons
win:
  icon: electron/icons/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
linux:
  icon: electron/icons/icon_512x512.png
  target:
    - deb
    - rpm
    - AppImage
mac:
  icon: electron/icons/QIM.icns
  target:
    - dmg
    - zip
  entitlements: electron/entitlements.mac.plist
  entitlementsInherit: electron/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
nsis:
  oneClick: false
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: QIM-${version}.${ext}
publish:
  provider: generic
  url: http://localhost:8080/api/v1/updates/win7/
  channel: latest
