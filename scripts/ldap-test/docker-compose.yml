version: '3.8'

services:
  openldap:
    image: osixia/openldap:1.5.0
    container_name: qim-ldap-test
    ports:
      - "389:389"
      - "636:636"
    environment:
      LDAP_ORGANISATION: "QIM Test"
      LDAP_DOMAIN: "qim.local"
      LDAP_BASE_DN: "dc=qim,dc=local"
      LDAP_ADMIN_PASSWORD: "admin123"
      LDAP_CONFIG_PASSWORD: "config123"
      LDAP_TLS: "false"
    volumes:
      - ./users.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/users.ldif
    command: --copy-service

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: qim-ldap-admin
    ports:
      - "6443:443"
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
    depends_on:
      - openldap
