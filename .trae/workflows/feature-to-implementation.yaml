---
name: "功能需求到开发实现"
description: "从产品需求分析到技术架构设计、UI 设计、最终输出开发计划的端到端工作流"
agents_dir: "agency-agents-zh"
inputs:
  - name: feature_request
    required: true
    description: "功能需求描述"
  - name: context
    required: false
    default: "QIM 企业即时通讯系统"
    description: "项目上下文"

steps:
  - id: analyze_requirement
    role: "product/product-manager"
    task: "作为产品经理，分析以下功能需求：\n{{feature_request}}\n\n项目上下文：{{context}}\n\n请输出：\n1. 问题陈述（我们解决什么用户痛点）\n2. 目标与成功指标（如何衡量成功）\n3. 用户故事和验收标准"
    output: requirement_doc

  - id: design_architecture
    role: "engineering/engineering-technical-architect"
    task: "作为技术架构师，基于需求文档设计技术方案：\n\n需求文档：\n{{requirement_doc}}\n\n项目上下文：{{context}}\n\n请输出：\n1. 架构设计（系统上下文、组件架构）\n2. 技术选型和决策理由\n3. 性能与扩展方案"
    output: architecture_doc
    depends_on: [analyze_requirement]

  - id: design_ui_ux
    role: "design/design-im-ui-ux-designer"
    task: "作为 UI/UX 设计师，基于需求文档进行界面和交互设计：\n\n需求文档：\n{{requirement_doc}}\n\n项目上下文：{{context}}\n\n请输出：\n1. 用户旅程和交互流程\n2. 组件设计规范（含所有状态）\n3. 无障碍和响应式要求"
    output: design_doc
    depends_on: [analyze_requirement]

  - id: plan_development
    role: "engineering/engineering-fullstack-developer"
    task: "作为全栈开发工程师，基于架构设计和设计规范制定实现计划：\n\n需求文档：\n{{requirement_doc}}\n\n架构设计：\n{{architecture_doc}}\n\n设计规范：\n{{design_doc}}\n\n项目上下文：{{context}}\n\n请输出：\n1. 组件/服务拆分方案（每个文件职责清晰）\n2. 实现细节（TypeScript 类型、错误处理、测试策略）\n3. 性能优化清单和验收标准"
    output: development_plan
    depends_on: [design_architecture, design_ui_ux]
