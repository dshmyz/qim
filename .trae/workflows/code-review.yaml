---
name: "代码审查与优化"
description: "多维度代码审查工作流，从产品质量、架构合理性、用户体验和性能优化四个角度审查代码"
agents_dir: "agency-agents-zh"
inputs:
  - name: code_context
    required: true
    description: "代码文件路径或代码片段"
  - name: review_focus
    required: false
    default: "全面审查"
    description: "审查重点（全面审查/性能优化/架构重构/错误处理）"

steps:
  - id: quality_review
    role: "product/product-manager"
    task: "作为产品经理，从用户价值角度审查以下代码实现：\n\n代码上下文：\n{{code_context}}\n\n审查重点：{{review_focus}}\n\n请输出：\n1. 这个功能是否解决了用户的核心痛点？\n2. 用户体验是否有可以改进的地方？\n3. 是否有遗漏的用户场景或边界情况？"
    output: product_feedback

  - id: architecture_review
    role: "engineering/engineering-technical-architect"
    task: "作为技术架构师，从架构合理性角度审查代码：\n\n代码上下文：\n{{code_context}}\n\n审查重点：{{review_focus}}\n\n请输出：\n1. 组件/服务边界是否清晰？\n2. 依赖关系是否合理，有无循环依赖？\n3. 是否有过度设计或设计不足？\n4. 扩展点是否合理？"
    output: architecture_feedback
    depends_on: [quality_review]

  - id: ux_review
    role: "design/design-im-ui-ux-designer"
    task: "作为 UI/UX 设计师，从用户体验角度审查前端代码：\n\n代码上下文：\n{{code_context}}\n\n审查重点：{{review_focus}}\n\n请输出：\n1. 交互流程是否顺畅，有无认知负担？\n2. 错误状态和加载状态是否完善？\n3. 无障碍合规性如何？\n4. 响应式适配是否合理？"
    output: ux_feedback

  - id: dev_review
    role: "engineering/engineering-fullstack-developer"
    task: "作为全栈开发工程师，从代码质量和性能角度审查：\n\n代码上下文：\n{{code_context}}\n\n审查重点：{{review_focus}}\n\n产品反馈：\n{{product_feedback}}\n\n架构反馈：\n{{architecture_feedback}}\n\nUX 反馈：\n{{ux_feedback}}\n\n请输出：\n1. 代码异味和可维护性问题（文件过大、职责不清等）\n2. 错误处理是否完善，有无掩盖错误的 try-catch？\n3. 性能优化建议（渲染优化、内存管理、网络请求等）\n4. 测试覆盖建议"
    output: dev_feedback
    depends_on: [architecture_review, ux_review]

  - id: summary
    role: "engineering/engineering-fullstack-developer"
    task: "作为全栈开发工程师，综合所有审查反馈生成最终审查报告：\n\n产品反馈：\n{{product_feedback}}\n\n架构反馈：\n{{architecture_feedback}}\n\nUX 反馈：\n{{ux_feedback}}\n\n开发反馈：\n{{dev_feedback}}\n\n请输出：\n1. 审查总结（按严重度排序的问题清单）\n2. 修复优先级（P0/P1/P2）\n3. 具体修复建议和代码示例"
    output: final_review
    depends_on: [dev_review]
