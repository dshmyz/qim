---
name: "产品+技术全链路评审"
description: "从产品需求到技术架构、设计系统、开发实现的完整评审流程"
agents_dir: "agency-agents-zh"
inputs:
  - name: feature_description
    required: true
    description: "功能需求描述"
  - name: target_users
    required: false
    default: "企业用户"
    description: "目标用户群体"
  - name: priority
    required: false
    default: "P1"
    description: "优先级 (P0/P1/P2)"

steps:
  - id: product_review
    role: "product/product-manager"
    task: "作为产品经理，评审以下功能需求：\n{{feature_description}}\n\n目标用户：{{target_users}}\n优先级：{{priority}}\n\n请输出：\n1. 问题陈述和用户痛点分析\n2. 机会评估（含 RICE 评分）\n3. 核心用户故事和验收标准"
    output: product_requirements

  - id: architecture_review
    role: "engineering/engineering-technical-architect"
    task: "作为技术架构师，基于产品需求进行架构评审：\n\n产品需求：\n{{product_requirements}}\n\n请输出：\n1. 系统上下文图和组件架构设计\n2. 技术选型评估（含备选方案对比）\n3. 性能和可扩展性方案"
    output: architecture_design
    depends_on: [product_review]

  - id: design_review
    role: "design/design-im-ui-ux-designer"
    task: "作为 UI/UX 设计师，基于产品需求进行设计评审：\n\n产品需求：\n{{product_requirements}}\n\n请输出：\n1. 用户旅程和交互流程图\n2. 核心组件设计规范（含状态说明）\n3. 可用性评估和改进建议"
    output: design_spec
    depends_on: [product_review]

  - id: development_plan
    role: "engineering/engineering-fullstack-developer"
    task: "作为全栈开发工程师，基于架构设计和设计规范制定开发计划：\n\n产品需求：\n{{product_requirements}}\n\n架构设计：\n{{architecture_design}}\n\n设计规范：\n{{design_spec}}\n\n请输出：\n1. 组件/服务拆分方案\n2. 技术实现细节和错误处理策略\n3. 测试计划和性能优化方案"
    output: development_plan
    depends_on: [architecture_review, design_review]
