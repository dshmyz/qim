server:
  port: "8080"
  mode: "debug"

jwt:
  secret: "your-secret-key-change-in-production"
  expire_hours: 2
  refresh_expire_days: 7

database:
  type: "sqlite"
  path: "./qim.db"
  # type: "mysql"
  # host: "localhost"
  # port: 3306
  # username: "root"
  # password: "your-password"
  # database: "qim_server"

# 多节点配置
cluster:
  enabled: false
  # 其他节点的地址列表
  nodes:
    # - "http://node1:8080"
    # - "http://node2:8080"

# 文件存储配置
storage:
  # 存储类型: local 或 s3
  type: "local"
  # 本地存储配置
  local:
    path: "./uploads"
  # S3存储配置
  s3:
    endpoint: "s3.amazonaws.com"
    access_key: "your-access-key"
    secret_key: "your-secret-key"
    bucket: "qim"
    region: "us-east-1"
    use_ssl: true

# AI配置
ai:
  # AI提供商: openai, baidu, alibaba, tencent, bytedance
  provider: "openai"
  # 通用配置
  max_tokens: 1000
  temperature: 0.7
  # OpenAI配置
  openai:
    api_key: "YOUR-AI-API-KEY-HERE"
    model: "qwen-flash"
    base_url: "http://0yc4r0gn901.copilot.rds.aliyuncs.com/compatible-mode/v1"
  # 百度文心一言配置
  baidu:
    api_key: ""
    secret_key: ""
    model: "ERNIE-Bot-4.0"
    base_url: "https://aip.baidubce.com"
  # 阿里通义千问配置
  alibaba:
    api_key: ""
    api_secret: ""
    model: "qwen-plus"
    base_url: "https://dashscope.aliyuncs.com/api/v1"
  # 腾讯混元大模型配置
  tencent:
    secret_id: ""
    secret_key: ""
    model: "hunyuan-pro"
    base_url: "https://hunyuan.tencentcloudapi.com"
  # 字节跳动豆包配置
  bytedance:
    api_key: ""
    model: "doubao-pro-1.0"
    base_url: "https://ark.cn-beijing.volces.com/api/v3"
  # Anthropic/Claude配置
  anthropic:
    api_key: "YOUR-AI-API-KEY-HERE"
    model: "glm-5.1"
    base_url: "http://0yc4r0gn901.copilot.rds.aliyuncs.com/apps/anthropic"
