<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>短链接生成</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .sl-container {
      width: 100%;
      max-width: 450px;
    }
    .sl-input-section {
      margin-bottom: 16px;
    }
    .sl-label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      color: #6b7280;
    }
    .sl-url-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #ffffff;
      color: #1f2937;
      font-size: 14px;
      line-height: 1.4;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .sl-url-input:focus {
      border-color: #4a90d9;
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
    }
    .sl-generate-btn {
      width: 100%;
      padding: 12px;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-bottom: 20px;
    }
    .sl-generate-btn:hover {
      background: #3a7bc8;
    }
    .sl-generate-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .sl-result {
      background: #ffffff;
      border-radius: 8px;
      padding: 16px;
      display: none;
      border: 1px solid #e5e7eb;
    }
    .sl-result.visible {
      display: block;
    }
    .sl-result-label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .sl-result-url {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .sl-result-text {
      flex: 1;
      padding: 8px 12px;
      background: #f9fafb;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #2ecc71;
      word-break: break-all;
      border: 1px solid #e5e7eb;
    }
    .sl-copy-btn {
      padding: 8px 14px;
      background: #2ecc71;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      transition: background 0.2s ease;
    }
    .sl-copy-btn:hover {
      background: #27ae60;
    }
  </style>
</head>
<body>
  <div class="sl-container">
    <div class="sl-input-section">
      <label class="sl-label" for="original-url">原始 URL</label>
      <textarea class="sl-url-input" id="original-url" placeholder="请输入要缩短的 URL，如 https://example.com/very/long/path/..."></textarea>
    </div>
    <button class="sl-generate-btn" id="generate-btn">生成短链接</button>
    <div class="sl-result" id="sl-result">
      <div class="sl-result-label">短链接</div>
      <div class="sl-result-url">
        <span class="sl-result-text" id="short-url"></span>
        <button class="sl-copy-btn" id="copy-btn">复制</button>
      </div>
    </div>
  </div>
  <script src="../sdk/qim-miniapp-bridge.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var urlInput = document.getElementById('original-url');
      var generateBtn = document.getElementById('generate-btn');
      var resultDiv = document.getElementById('sl-result');
      var shortUrlEl = document.getElementById('short-url');
      var copyBtn = document.getElementById('copy-btn');

      QIMBridge.init();

      generateBtn.addEventListener('click', function() {
        var url = urlInput.value.trim();
        if (!url) {
          QIMBridge.showToast('请输入原始 URL');
          return;
        }
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
          url = 'https://' + url;
        }

        generateBtn.disabled = true;
        generateBtn.textContent = '生成中...';

        QIMBridge.api('POST', '/api/v1/shortlinks', { original_url: url })
          .then(function(result) {
            if (result.code === 0) {
              shortUrlEl.textContent = result.data.short_url;
              resultDiv.classList.add('visible');
              QIMBridge.showToast('短链接生成成功');
            } else {
              QIMBridge.showToast(result.message || '生成失败');
            }
          })
          .catch(function() {
            QIMBridge.showToast('请求失败');
          })
          .finally(function() {
            generateBtn.disabled = false;
            generateBtn.textContent = '生成短链接';
          });
      });

      copyBtn.addEventListener('click', function() {
        navigator.clipboard.writeText(shortUrlEl.textContent).then(function() {
          copyBtn.textContent = '已复制';
          setTimeout(function() { copyBtn.textContent = '复制'; }, 1500);
        }).catch(function() {
          copyBtn.textContent = '失败';
          setTimeout(function() { copyBtn.textContent = '复制'; }, 1500);
        });
      });

      window.parent.postMessage({ type: 'miniapp-loaded', appId: 'short-link' }, '*');
    });
  </script>
</body>
</html>
