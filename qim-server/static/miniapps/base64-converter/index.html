<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 编解码</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #1f2937;
      padding: 16px;
      min-height: 100vh;
    }
    .container {
      max-width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .toolbar-btn {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .toolbar-btn:hover {
      transform: translateY(-1px);
    }
    .btn-encode {
      background: #4a90d9;
      color: white;
    }
    .btn-encode:hover {
      background: #3a7bc8;
    }
    .btn-decode {
      background: #2ecc71;
      color: white;
    }
    .btn-decode:hover {
      background: #27ae60;
    }
    .btn-copy {
      background: #ffffff;
      color: #1f2937;
      border: 1px solid #e5e7eb;
    }
    .btn-copy:hover {
      border-color: #4a90d9;
      color: #4a90d9;
    }
    .btn-clear {
      background: #ffffff;
      color: #e74c3c;
      border: 1px solid #e5e7eb;
    }
    .btn-clear:hover {
      border-color: #e74c3c;
    }
    .input-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .section-label {
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
    }
    .text-input,
    .text-output {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .text-input {
      background: #ffffff;
      color: #1f2937;
    }
    .text-input:focus {
      border-color: #4a90d9;
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
    }
    .text-output {
      background: #f9fafb;
      color: #1f2937;
      white-space: pre-wrap;
      word-break: break-all;
      overflow-y: auto;
    }
    .status-bar {
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      display: none;
    }
    .status-bar.success {
      display: block;
      background: rgba(46, 204, 113, 0.15);
      color: #2ecc71;
    }
    .status-bar.error {
      display: block;
      background: rgba(231, 76, 60, 0.15);
      color: #e74c3c;
    }
    .url-safe-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #6b7280;
    }
    .url-safe-toggle input {
      accent-color: #4a90d9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <button class="toolbar-btn btn-encode" id="encode-btn">编码</button>
      <button class="toolbar-btn btn-decode" id="decode-btn">解码</button>
      <button class="toolbar-btn btn-copy" id="copy-btn">复制</button>
      <button class="toolbar-btn btn-clear" id="clear-btn">清空</button>
      <label class="url-safe-toggle">
        <input type="checkbox" id="url-safe" />
        URL 安全模式
      </label>
    </div>
    <div class="input-section">
      <span class="section-label">输入文本</span>
      <textarea class="text-input" id="text-input" placeholder="输入要编码或解码的文本"></textarea>
    </div>
    <div class="status-bar" id="status-bar"></div>
    <div class="input-section">
      <span class="section-label">输出结果</span>
      <pre class="text-output" id="text-output">等待输入...</pre>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var inputEl = document.getElementById('text-input');
      var outputEl = document.getElementById('text-output');
      var statusBar = document.getElementById('status-bar');
      var encodeBtn = document.getElementById('encode-btn');
      var decodeBtn = document.getElementById('decode-btn');
      var copyBtn = document.getElementById('copy-btn');
      var clearBtn = document.getElementById('clear-btn');
      var urlSafeCheckbox = document.getElementById('url-safe');

      function showStatus(message, type) {
        statusBar.textContent = message;
        statusBar.className = 'status-bar ' + type;
        setTimeout(function() {
          statusBar.className = 'status-bar';
        }, 3000);
      }

      function utf8ToBase64(str) {
        var bytes = new TextEncoder().encode(str);
        var binary = '';
        bytes.forEach(function(b) {
          binary += String.fromCharCode(b);
        });
        return btoa(binary);
      }

      function base64ToUtf8(str) {
        var binary = atob(str);
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }
        return new TextDecoder().decode(bytes);
      }

      encodeBtn.addEventListener('click', function() {
        var raw = inputEl.value;
        if (!raw) {
          showStatus('请输入文本', 'error');
          return;
        }
        var encoded = utf8ToBase64(raw);
        if (urlSafeCheckbox.checked) {
          encoded = encoded.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }
        outputEl.textContent = encoded;
        showStatus('编码成功', 'success');
      });

      decodeBtn.addEventListener('click', function() {
        var raw = inputEl.value.trim();
        if (!raw) {
          showStatus('请输入 Base64 字符串', 'error');
          return;
        }
        try {
          var decoded = base64ToUtf8(raw);
          outputEl.textContent = decoded;
          showStatus('解码成功', 'success');
        } catch (e) {
          outputEl.textContent = '';
          showStatus('解码失败: ' + e.message, 'error');
        }
      });

      copyBtn.addEventListener('click', function() {
        var text = outputEl.textContent;
        if (!text || text === '等待输入...') {
          showStatus('没有可复制的内容', 'error');
          return;
        }
        navigator.clipboard.writeText(text).then(function() {
          showStatus('已复制到剪贴板', 'success');
        }).catch(function() {
          showStatus('复制失败', 'error');
        });
      });

      clearBtn.addEventListener('click', function() {
        inputEl.value = '';
        outputEl.textContent = '等待输入...';
        statusBar.className = 'status-bar';
      });

      window.parent.postMessage({ type: 'miniapp-loaded', appId: 'base64-converter' }, '*');
    });
  </script>
</body>
</html>
