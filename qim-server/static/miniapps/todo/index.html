<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办事项</title>
  <script src="/miniapps/sdk/qim-miniapp-bridge.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #1f2937;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .todo-container {
      width: 100%;
      max-width: 500px;
    }
    .todo-header {
      margin-bottom: 16px;
    }
    .todo-header h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .todo-stats {
      font-size: 13px;
      color: #6b7280;
    }
    .todo-input-container {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .todo-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #ffffff;
      color: #1f2937;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .todo-input:focus {
      border-color: #4a90d9;
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
    }
    .add-todo-btn {
      padding: 10px 18px;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s ease;
      white-space: nowrap;
    }
    .add-todo-btn:hover {
      background: #3a7bc8;
    }
    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 350px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .todo-list::-webkit-scrollbar {
      width: 6px;
    }
    .todo-list::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 3px;
    }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #ffffff;
      border-radius: 8px;
      transition: background 0.2s ease;
      border: 1px solid #e5e7eb;
    }
    .todo-item:hover {
      background: #f9fafb;
    }
    .todo-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid #d1d5db;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .todo-checkbox.checked {
      background: #2ecc71;
      border-color: #2ecc71;
    }
    .todo-checkbox.checked::after {
      content: '✓';
      color: white;
      font-size: 12px;
      font-weight: bold;
    }
    .todo-text {
      flex: 1;
      font-size: 14px;
      line-height: 1.4;
    }
    .todo-text.completed {
      color: #9ca3af;
      text-decoration: line-through;
    }
    .todo-delete-btn {
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .todo-delete-btn:hover {
      color: #e74c3c;
      background: rgba(231, 76, 60, 0.1);
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #9ca3af;
    }
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 8px;
    }
    .status-bar {
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      display: none;
    }
    .status-bar.success {
      display: block;
      background: rgba(46, 204, 113, 0.15);
      color: #2ecc71;
    }
    .status-bar.error {
      display: block;
      background: rgba(231, 76, 60, 0.15);
      color: #e74c3c;
    }
    .status-bar.loading {
      display: block;
      background: rgba(74, 144, 217, 0.15);
      color: #4a90d9;
    }
  </style>
</head>
<body>
  <div class="todo-container">
    <div class="todo-header">
      <h2>待办事项</h2>
      <div class="todo-stats" id="todo-stats"></div>
    </div>
    <div class="todo-input-container">
      <input type="text" class="todo-input" id="todo-input" placeholder="输入新任务..." />
      <button class="add-todo-btn" id="add-todo">添加</button>
    </div>
    <div class="status-bar" id="status-bar"></div>
    <div class="todo-list" id="todo-list"></div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var inputEl = document.getElementById('todo-input');
      var addBtn = document.getElementById('add-todo');
      var listEl = document.getElementById('todo-list');
      var statsEl = document.getElementById('todo-stats');
      var statusBar = document.getElementById('status-bar');

      var tasks = [];
      var isLoading = false;

      function showStatus(message, type) {
        statusBar.textContent = message;
        statusBar.className = 'status-bar ' + type;
        if (type !== 'loading') {
          setTimeout(function() {
            statusBar.className = 'status-bar';
          }, 2000);
        }
      }

      function updateStats(items) {
        var total = items.length;
        var completed = items.filter(function(t) { return t.status === 'completed'; }).length;
        statsEl.textContent = total > 0 ? '共 ' + total + ' 项，已完成 ' + completed + ' 项' : '暂无待办事项';
      }

      function render() {
        updateStats(tasks);
        listEl.innerHTML = '';

        if (tasks.length === 0) {
          listEl.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><div>暂无待办事项，添加一个吧</div></div>';
          return;
        }

        tasks.forEach(function(task) {
          var item = document.createElement('div');
          item.className = 'todo-item';

          var checkbox = document.createElement('div');
          checkbox.className = 'todo-checkbox' + (task.status === 'completed' ? ' checked' : '');
          checkbox.addEventListener('click', function() {
            toggleTaskStatus(task);
          });

          var text = document.createElement('span');
          text.className = 'todo-text' + (task.status === 'completed' ? ' completed' : '');
          text.textContent = task.title;

          var deleteBtn = document.createElement('button');
          deleteBtn.className = 'todo-delete-btn';
          deleteBtn.textContent = '×';
          deleteBtn.addEventListener('click', function() {
            deleteTask(task.id);
          });

          item.appendChild(checkbox);
          item.appendChild(text);
          item.appendChild(deleteBtn);
          listEl.appendChild(item);
        });
      }

      async function loadTasks() {
        if (isLoading) return;
        isLoading = true;
        showStatus('加载中...', 'loading');
        try {
          var res = await QIMBridge.api('GET', '/api/v1/tasks');
          if (res && res.data) {
            tasks = res.data;
            render();
          }
          statusBar.className = 'status-bar';
        } catch (e) {
          showStatus('加载失败: ' + e.message, 'error');
        } finally {
          isLoading = false;
        }
      }

      async function addTask() {
        var text = inputEl.value.trim();
        if (!text) return;

        try {
          var res = await QIMBridge.api('POST', '/api/v1/tasks', {
            title: text,
            status: 'todo',
            priority: 'medium'
          });
          if (res && res.data) {
            tasks.push(res.data);
            inputEl.value = '';
            render();
            showStatus('添加成功', 'success');
          }
        } catch (e) {
          showStatus('添加失败: ' + e.message, 'error');
        }
      }

      async function toggleTaskStatus(task) {
        var newStatus = task.status === 'completed' ? 'todo' : 'completed';
        try {
          var res = await QIMBridge.api('PATCH', '/api/v1/tasks/' + task.id + '/status', {
            status: newStatus
          });
          if (res && res.data) {
            var idx = tasks.findIndex(function(t) { return t.id === task.id; });
            if (idx !== -1) {
              tasks[idx] = res.data;
            }
            render();
          }
        } catch (e) {
          showStatus('操作失败: ' + e.message, 'error');
        }
      }

      async function deleteTask(taskId) {
        try {
          await QIMBridge.api('DELETE', '/api/v1/tasks/' + taskId);
          tasks = tasks.filter(function(t) { return t.id !== taskId; });
          render();
          showStatus('已删除', 'success');
        } catch (e) {
          showStatus('删除失败: ' + e.message, 'error');
        }
      }

      addBtn.addEventListener('click', addTask);
      inputEl.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') addTask();
      });

      QIMBridge.init(function() {
        loadTasks();
      });

      window.parent.postMessage({ type: 'miniapp-loaded', appId: 'todo' }, '*');
    });
  </script>
</body>
</html>
