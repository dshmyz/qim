<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON 格式化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #1f2937;
      padding: 16px;
      min-height: 100vh;
    }
    .container {
      max-width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .toolbar-btn {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .toolbar-btn:hover {
      transform: translateY(-1px);
    }
    .btn-format {
      background: #4a90d9;
      color: white;
    }
    .btn-format:hover {
      background: #3a7bc8;
    }
    .btn-minify {
      background: #2ecc71;
      color: white;
    }
    .btn-minify:hover {
      background: #27ae60;
    }
    .btn-copy {
      background: #ffffff;
      color: #1f2937;
      border: 1px solid #e5e7eb;
    }
    .btn-copy:hover {
      border-color: #4a90d9;
      color: #4a90d9;
    }
    .btn-clear {
      background: #ffffff;
      color: #e74c3c;
      border: 1px solid #e5e7eb;
    }
    .btn-clear:hover {
      border-color: #e74c3c;
    }
    .input-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .section-label {
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
    }
    .json-input,
    .json-output {
      width: 100%;
      min-height: 150px;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .json-input {
      background: #ffffff;
      color: #1f2937;
    }
    .json-input:focus {
      border-color: #4a90d9;
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
    }
    .json-output {
      background: #f9fafb;
      color: #1f2937;
      white-space: pre-wrap;
      word-break: break-all;
      overflow-y: auto;
    }
    .status-bar {
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      display: none;
    }
    .status-bar.success {
      display: block;
      background: rgba(46, 204, 113, 0.15);
      color: #2ecc71;
    }
    .status-bar.error {
      display: block;
      background: rgba(231, 76, 60, 0.15);
      color: #e74c3c;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <button class="toolbar-btn btn-format" id="format-btn">格式化</button>
      <button class="toolbar-btn btn-minify" id="minify-btn">压缩</button>
      <button class="toolbar-btn btn-copy" id="copy-btn">复制</button>
      <button class="toolbar-btn btn-clear" id="clear-btn">清空</button>
    </div>
    <div class="input-section">
      <span class="section-label">输入 JSON</span>
      <textarea class="json-input" id="json-input" placeholder='粘贴 JSON 字符串，如：{"name":"test","value":123}'></textarea>
    </div>
    <div class="status-bar" id="status-bar"></div>
    <div class="input-section">
      <span class="section-label">输出结果</span>
      <pre class="json-output" id="json-output">等待输入...</pre>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var inputEl = document.getElementById('json-input');
      var outputEl = document.getElementById('json-output');
      var statusBar = document.getElementById('status-bar');
      var formatBtn = document.getElementById('format-btn');
      var minifyBtn = document.getElementById('minify-btn');
      var copyBtn = document.getElementById('copy-btn');
      var clearBtn = document.getElementById('clear-btn');

      function showStatus(message, type) {
        statusBar.textContent = message;
        statusBar.className = 'status-bar ' + type;
        setTimeout(function() {
          statusBar.className = 'status-bar';
        }, 3000);
      }

      function formatJSON(indent) {
        var raw = inputEl.value.trim();
        if (!raw) {
          showStatus('请输入 JSON 字符串', 'error');
          return;
        }
        try {
          var parsed = JSON.parse(raw);
          var formatted = JSON.stringify(parsed, null, indent);
          outputEl.textContent = formatted;
          showStatus('格式化成功', 'success');
        } catch (e) {
          outputEl.textContent = '';
          showStatus('JSON 解析错误: ' + e.message, 'error');
        }
      }

      formatBtn.addEventListener('click', function() {
        formatJSON(2);
      });

      minifyBtn.addEventListener('click', function() {
        var raw = inputEl.value.trim();
        if (!raw) {
          showStatus('请输入 JSON 字符串', 'error');
          return;
        }
        try {
          var parsed = JSON.parse(raw);
          var minified = JSON.stringify(parsed);
          outputEl.textContent = minified;
          showStatus('压缩成功', 'success');
        } catch (e) {
          outputEl.textContent = '';
          showStatus('JSON 解析错误: ' + e.message, 'error');
        }
      });

      copyBtn.addEventListener('click', function() {
        var text = outputEl.textContent;
        if (!text || text === '等待输入...') {
          showStatus('没有可复制的内容', 'error');
          return;
        }
        navigator.clipboard.writeText(text).then(function() {
          showStatus('已复制到剪贴板', 'success');
        }).catch(function() {
          showStatus('复制失败', 'error');
        });
      });

      clearBtn.addEventListener('click', function() {
        inputEl.value = '';
        outputEl.textContent = '等待输入...';
        statusBar.className = 'status-bar';
      });

      window.parent.postMessage({ type: 'miniapp-loaded', appId: 'json-formatter' }, '*');
    });
  </script>
</body>
</html>
