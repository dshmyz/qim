server:
  port: "8080"
  mode: "debug"

jwt:
  secret: "${QIM_JWT_SECRET:change-me-to-random-string}"
  expire: 7200
  refresh_expire_days: 7

database:
  type: "sqlite"
  path: "./qim.db"

cluster:
  enabled: false
  nodes: []

storage:
  type: "local"
  local:
    path: "./uploads"
  s3:
    endpoint: "s3.amazonaws.com"
    access_key: "your-access-key"
    secret_key: "your-secret-key"
    bucket: "qim"
    region: "us-east-1"
    use_ssl: true

ai:
  provider: "openai"
  max_tokens: 1000
  temperature: 0.7
  openai:
    api_key: ""
    model: "gpt-3.5-turbo"
    base_url: "https://api.openai.com/v1"

app:
  version: "1.0.0"
  update_url: ""
  force_update: false
  release_notes: ""

upload:
  max_size_mb: 100
  allowed_types:
    - "image/jpeg"
    - "image/png"
    - "image/gif"
    - "image/webp"
    - "application/pdf"
    - "application/zip"
    - "application/x-zip-compressed"
    - "application/msword"
    - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
    - "application/vnd.ms-excel"
    - "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
    - "text/plain"
    - "video/mp4"
    - "audio/mpeg"
    - "audio/wav"
    - "application/octet-stream"
