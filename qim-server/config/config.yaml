server:
  port: "8080"
  mode: "debug"

jwt:
  secret: "${QIM_JWT_SECRET:change-me-to-random-string}"
  expire: 7200
  refresh_expire_days: 7

database:
  type: "sqlite"
  path: "./qim.db"

cluster:
  enabled: false
  nodes: []

storage:
  type: "local"
  local:
    path: "./uploads"
  s3:
    endpoint: "s3.amazonaws.com"
    access_key: "your-access-key"
    secret_key: "your-secret-key"
    bucket: "qim"
    region: "us-east-1"
    use_ssl: true

ai:
  provider: "openai"
  max_tokens: 1000
  temperature: 0.7
  openai:
    api_key: ""
    model: "gpt-3.5-turbo"
    base_url: "https://api.openai.com/v1"
