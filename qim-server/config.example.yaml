# QIM Server 配置文件
# 
# 环境变量说明:
# - QIM_JWT_SECRET: JWT密钥，建议设置为随机字符串
# - QIM_ADMIN_USERNAME: 管理员用户名（默认: admin）
# - QIM_ADMIN_PASSWORD: 管理员密码（默认: admin123）
#
# 注意：首次启动时会自动创建管理员账户，建议在生产环境中修改默认密码

# 服务器配置
server:
  port: "8080"
  mode: "release"  # debug / release / test

# 数据初始化策略
# 控制启动时哪些数据需要初始化，不同环境可有不同的策略
data_init:
  preset_data: true       # 预置数据（系统用户、管理员、内置应用、文件上传配置）
  bot_templates: true     # Bot 模板（系统助手、AI助手）
  demo_mini_apps: false   # 演示小程序（计算器、记事本等）
  test_data: false        # 测试数据（测试用户、部门、会话、频道等）
  seed_force: false       # 是否强制重新初始化（演示环境可设为 true）

# JWT 配置
jwt:
  secret: "${QIM_JWT_SECRET:change-me-to-random-string}"
  expire: 7200  # 秒
  refresh_expire_days: 7

# 日志配置
# 设置 LOG_DIR 环境变量或配置下方 dir 后，日志会按天写入文件并自动归档
# 不配置则仅输出到 stdout（标准输出）
log:
  dir: "./logs"

# 数据库配置
database:
  type: "sqlite"  # sqlite / mysql / postgresql
  path: "./qim.db"
  # MySQL/PostgreSQL 配置示例:
  # host: "localhost"
  # port: 3306
  # username: "root"
  # password: "your-password"
  # database: "qim_server"

# 多节点配置
cluster:
  enabled: false
  # 其他节点的地址列表
  nodes: []
  # - "http://node1:8080"
  # - "http://node2:8080"

# 文件存储配置
storage:
  # 存储类型: local 或 s3
  type: "local"
  # 本地存储配置
  local:
    path: "./uploads"
  # S3存储配置
  s3:
    endpoint: "s3.amazonaws.com"
    access_key: "your-access-key"
    secret_key: "your-secret-key"
    bucket: "qim"
    region: "us-east-1"
    use_ssl: true

# AI 配置
ai:
  # 路由配置 - 为不同任务指定不同的模型
  router:
    default_task: "chat"
    routes:
      chat:
        provider: "openai"
        model: "gpt-3.5-turbo"
      intent_recognition:
        provider: "openai"
        model: "gpt-3.5-turbo"
      analysis:
        provider: "openai"
        model: "gpt-3.5-turbo"
      embedding:
        provider: "openai"
        model: "text-embedding-ada-002"
      tool_calling:
        provider: "openai"
        model: "gpt-3.5-turbo"
      search:
        provider: "openai"
        model: "gpt-3.5-turbo"
      digest:
        provider: "openai"
        model: "gpt-3.5-turbo"
  
  # 通用配置
  max_tokens: 1000
  temperature: 0.7
  
  # OpenAI 配置
  openai:
    api_key: "your-openai-api-key"
    model: "gpt-3.5-turbo"
    base_url: "https://api.openai.com/v1"
    embedding_model: "text-embedding-ada-002"
  
  # 百度文心一言配置
  baidu:
    api_key: ""
    secret_key: ""
    model: "ERNIE-Bot-4.0"
    base_url: "https://aip.baidubce.com"
  
  # 阿里通义千问配置
  alibaba:
    api_key: ""
    api_secret: ""
    model: "qwen-plus"
    base_url: "https://dashscope.aliyuncs.com/api/v1"
  
  # 腾讯混元大模型配置
  tencent:
    secret_id: ""
    secret_key: ""
    model: "hunyuan-pro"
    base_url: "https://hunyuan.tencentcloudapi.com"
  
  # 字节跳动豆包配置
  bytedance:
    api_key: ""
    model: "doubao-pro-1.0"
    base_url: "https://ark.cn-beijing.volces.com/api/v3"
  
  # Anthropic/Claude 配置
  anthropic:
    api_key: "your-anthropic-api-key"
    model: "claude-3-sonnet-20240229"
    base_url: "https://api.anthropic.com"

# CORS 配置
cors:
  allowed_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"

# 向量数据库配置（用于 RAG 和知识图谱）
vector:
  path: "./vector.db"
